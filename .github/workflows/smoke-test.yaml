name: Smoke Test

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile archive and src
        run: |
          python -m compileall ./archive ./src

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Smoke run QuantAdvOld
        run: |
          timeout 5s python ./archive/QuantAdvOld.py || code=$?
          if [ "${code:-0}" = "124" ]; then exit 0; fi
          exit "${code:-0}"

      - name: Smoke run run_experiment
        run: |
          timeout 5s python ./src/run_experiment.py || code=$?
          if [ "${code:-0}" = "124" ]; then exit 0; fi
          exit "${code:-0}"